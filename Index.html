<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Noona ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI",sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:650px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    animation:fadeUp 1.2s;
    z-index:10;
}

h1{
    font-size:38px;
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

p{
    font-size:20px;
    line-height:1.8;
}

@keyframes fadeUp{
    from{opacity:0;transform:translateY(50px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

/* Floating Hearts */
.heart{
    position:absolute;
    color:#ff2d55;
    animation:float 8s linear infinite;
    opacity:.8;
}

@keyframes float{
    from{
        transform:translateY(110vh) scale(.5);
        opacity:0;
    }
    20%{opacity:1;}
    to{
        transform:translateY(-10vh) scale(1.5);
        opacity:0;
    }
}

button{
    margin-top:25px;
    padding:12px 28px;
    border:none;
    border-radius:30px;
    font-size:18px;
    background:#ff4b6e;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff2d55;
}
</style>
</head>

<body>

<div class="card">
<h1>💖 Sorry Noona 💖</h1>

<p>
တောင်းပန်ပါတယ် Noona။<br><br>

ကျွန်တော် ဒီလိုဖြစ်သွားမယ်လို့ တကယ်မထင်ထားခဲ့လို့ပါ။
Block / Memory တွေကို အလေးမထားတာမျိုး လုံးဝမဟုတ်ပါဘူး။

Noona စိတ်မကောင်းဖြစ်သွားရင်
တကယ်တောင်းပန်ပါတယ်။❤️

နောက်တစ်ခါ ဒီလိုမျိုး မဖြစ်အောင်
သေချာဂရုစိုက်ပါ့မယ်။
</p>

<button id="forgiveBtn">
    Forgive Me 🌸
</button>

</div>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(4+Math.random()*5)+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },9000);
}

setInterval(createHeart,300);
</script>
<audio id="bgMusic" preload="auto" loop>
    <source src="music (1).m4a" type="audio/mp4">
    Your browser does not support audio.
</audio>

<script>
const music = document.getElementById("bgMusic");
const btn = document.getElementById("forgiveBtn");

function playMusic(){
 music.play().catch(()=>{});
}
btn.addEventListener("click", playMusic);
document.addEventListener("click", playMusic,{once:true});
document.addEventListener("touchstart", playMusic,{once:true});
</script>
</body>
</html>
